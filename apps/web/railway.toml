# TradeFlow AI — Railway Web (Next.js) service
# Railway dashboard:
#   Service name: tradeflow-web
#   Config file: apps/web/railway.toml
#
# CRITICAL: Set on Railway → web service → Variables:
#   API_PROXY_URL (runtime) — proxies browser API calls to tradeflow-api
#   NEXT_PUBLIC_APP_URL, NEXT_PUBLIC_API_URL (build-time, optional with proxy)

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
watchPatterns = ["apps/web/**", "packages/**"]

[deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1

# Pass these as Railway "Build" variables (not just runtime):
[build.args]
NEXT_PUBLIC_APP_URL = "${{NEXT_PUBLIC_APP_URL}}"
NEXT_PUBLIC_API_URL = "${{NEXT_PUBLIC_API_URL}}"
NEXT_PUBLIC_API_VERSION = "${{NEXT_PUBLIC_API_VERSION}}"
