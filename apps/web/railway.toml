# TradeFlow AI — Railway Web (Next.js) service
# Railway dashboard:
#   Service name: tradeflow-web
#   Config file: apps/web/railway.toml
#
# CRITICAL: Set build-time variables in Railway → web service → Variables:
#   NEXT_PUBLIC_APP_URL, NEXT_PUBLIC_API_URL, NEXT_PUBLIC_API_VERSION

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
watchPatterns = ["apps/web/**", "packages/**"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1

# Pass these as Railway "Build" variables (not just runtime):
[build.args]
NEXT_PUBLIC_APP_URL = "${{NEXT_PUBLIC_APP_URL}}"
NEXT_PUBLIC_API_URL = "${{NEXT_PUBLIC_API_URL}}"
NEXT_PUBLIC_API_VERSION = "${{NEXT_PUBLIC_API_VERSION}}"
