name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build --filter=@tradeflow/web...

      - name: Vitest with coverage
        working-directory: apps/web
        run: pnpm test:coverage

      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: apps/web/coverage/

  python:
    name: Python API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tradeflow
          POSTGRES_PASSWORD: tradeflow_dev_password
          POSTGRES_DB: tradeflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tradeflow -d tradeflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      API_SECRET_KEY: ci-test-secret-key-minimum-thirty-two-characters-long
      DATABASE_URL: postgresql+asyncpg://tradeflow:tradeflow_dev_password@localhost:5432/tradeflow
      DATABASE_URL_SYNC: postgresql+psycopg://tradeflow:tradeflow_dev_password@localhost:5432/tradeflow
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      CELERY_TASK_ALWAYS_EAGER: 'true'
      AUTH_RATE_LIMIT_PER_MINUTE: '10000'
      API_RATE_LIMIT_PER_MINUTE: '10000'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -e ".[dev]"

      - name: Run database migrations
        working-directory: apps/api
        run: alembic upgrade head

      - name: Ruff lint
        working-directory: apps/api
        run: ruff check src tests

      - name: Ruff format check
        working-directory: apps/api
        run: ruff format --check src tests

      - name: Mypy
        working-directory: apps/api
        run: |
          mypy src/tradeflow/ai \
            src/tradeflow/core/csrf_middleware.py \
            src/tradeflow/core/security_middleware.py \
            src/tradeflow/core/rate_limit_middleware.py \
            src/tradeflow/features/ai \
            src/tradeflow/integrations/brokers/adapters/paper.py

      - name: Pytest critical modules (90% coverage gate)
        working-directory: apps/api
        run: |
          pytest \
            --cov=tradeflow.engine.sizing \
            --cov=tradeflow.engine.types \
            --cov=tradeflow.notifications.templates \
            --cov=tradeflow.core.security.jwt \
            --cov=tradeflow.core.security_middleware \
            --cov=tradeflow.core.rate_limit_middleware \
            --cov=tradeflow.core.observability.prometheus \
            --cov=tradeflow.risk.types \
            --cov-fail-under=90 \
            -q

      - name: Pytest full suite with coverage report
        working-directory: apps/api
        run: |
          pytest \
            --cov=tradeflow \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml

      - name: Upload API coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: |
            apps/api/htmlcov/
            apps/api/coverage.xml

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm build --filter=@tradeflow/web...

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: apps/web
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [typescript, python, frontend-tests, playwright]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t tradeflow-api:ci .

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t tradeflow-web:ci .
