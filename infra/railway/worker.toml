# TradeFlow AI — Railway Celery Worker
# Same Docker image as API; different start command.
# Railway dashboard:
#   Service name: tradeflow-worker
#   Dockerfile: apps/api/Dockerfile
#   Config file: infra/railway/worker.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = ["apps/api/**"]

[deploy]
startCommand = "./scripts/start-worker.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
