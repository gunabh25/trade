# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires .env with production secrets (see .env.production.example).

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    ports: []

  redis:
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: []

  api:
    environment:
      APP_ENV: production
      API_WORKERS: ${API_WORKERS:-2}
      API_LOG_FORMAT: json
      AUTH_COOKIE_SECURE: 'true'
      PROMETHEUS_ENABLED: 'true'
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:?API_CORS_ORIGINS required}
      API_TRUSTED_HOSTS: ${API_TRUSTED_HOSTS:-api,localhost}
      SENTRY_DSN: ${SENTRY_DSN:-}
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  celery-worker:
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    deploy:
      resources:
        limits:
          memory: 512M

  celery-beat:
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

  web:
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL required}
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: tradeflow-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.5.2
    container_name: tradeflow-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - '3001:3000'
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
