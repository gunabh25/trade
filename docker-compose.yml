services:
  postgres:
    image: postgres:16-alpine
    container_name: tradeflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tradeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradeflow_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tradeflow}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tradeflow} -d ${POSTGRES_DB:-tradeflow}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradeflow-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tradeflow-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://tradeflow:tradeflow_dev_password@postgres:5432/tradeflow
      DATABASE_URL_SYNC: postgresql+psycopg://tradeflow:tradeflow_dev_password@postgres:5432/tradeflow
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      API_CORS_ORIGINS: http://localhost:3000
    ports:
      - '${API_PORT:-8000}:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v1/health/live']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  celery-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tradeflow-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tradeflow:tradeflow_dev_password@postgres:5432/tradeflow
      DATABASE_URL_SYNC: postgresql+psycopg://tradeflow:tradeflow_dev_password@postgres:5432/tradeflow
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command:
      [
        'celery',
        '-A',
        'tradeflow.workers.celery_app:celery_app',
        'worker',
        '--loglevel=INFO',
      ]
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: tradeflow-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_API_VERSION: v1
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
